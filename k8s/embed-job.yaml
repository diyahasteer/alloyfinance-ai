apiVersion: batch/v1
kind: Job
metadata:
  name: embed-transactions-2
  namespace: app
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: embed
          image: gcr.io/alloydbbd/backend:latest
          command: ["python", "-u", "embed_transactions_2.py"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_URL
            - name: DATABASE_SSL_MODE
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_SSL_MODE
